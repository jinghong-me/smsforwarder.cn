name: Android Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode keystore (from secret) if provided
        shell: bash
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "Decoding keystore..."
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > ./keystore.jks
            chmod 600 ./keystore.jks
          else
            echo "No KEYSTORE_BASE64 secret provided; skipping keystore decode."
          fi

      - name: Verify keystore present
        run: ls -l ./keystore.jks || true

      - name: Download and install Gradle 8.2
        run: |
          wget https://services.gradle.org/distributions/gradle-8.2-bin.zip
          unzip -q gradle-8.2-bin.zip
          export PATH=$PWD/gradle-8.2/bin:$PATH
          gradle --version

      - name: Build with Gradle 8.2
        env:
          KEYSTORE_FILE: ${{ github.workspace }}/keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          export PATH=$PWD/gradle-8.2/bin:$PATH
          gradle assembleDebug --no-daemon 2>&1 | tee build.log
        continue-on-error: true

      - name: Check build status
        run: |
          if grep -q "BUILD SUCCESSFUL" build.log; then
            echo "Build succeeded"
            exit 0
          else
            echo "Build failed"
            cat build.log | tail -100
            exit 1
          fi

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log

      - name: List APK files
        run: find . -name "*.apk" -type f 2>/dev/null || echo "No APK files found"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: sms-forwarder-debug
          path: app/build/outputs/apk/debug/*.apk
